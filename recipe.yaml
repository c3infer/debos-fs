{{- $format          := or .format "ext4" -}}            
{{- $outdir          := or .outdir "images" -}}
{{- $cpioname        := or .cpioname "rootfs.cpio" -}}
{{- $cpioname_gz     := or .cpioname_gz "rootfs.cpio.gz" -}}
{{- $tarname         := or .tarname "rootfs.tar.gz" -}}
{{- $imgname         := or .imgname "rootfs.img" -}}
{{- $imgsize         := or .imgsize "500MB" -}}
{{- $py_enable       := or .py_enable "1" -}}             
{{- $py_prune_tests  := or .py_prune_tests "1" -}}
{{- $py_compile_pyc  := or .py_compile_pyc "1" -}}
{{- $py_drop_sources := or .py_drop_sources "0" -}}      
{{- $reqs_file       := or .reqs_file "requirements.txt" -}}
{{- $artifactdir := or .artifactdir "/tmp/artifacts" -}}
{{- $overlay_dir      := or .overlay_dir "" -}}
{{- $username := or .username "" -}}
{{- $hostname       := or .hostname "vm" -}}
{{- $overlay_dest   := or .overlay_dest "/root" -}}
{{- $device_mount := or .device_mount "" -}} 
{{- $mount_point := or .mount_point "" -}}
{{- $custom_script := or .custom_script "" -}}
{{- $custom_script_dest := or .custom_script_dest "/usr/local/bin/custom-script.sh" -}}




architecture: arm64

actions:
  - action: mmdebstrap
    description: Minimal Debian for arm64
    suite: bookworm
    components: [main]
    mirror: https://deb.debian.org/debian

  - action: apt
    description: Install systemd
    packages: [systemd, systemd-sysv, udev, sudo]
  
# We must make it optional later
 # - action: apt
  #  description: Add a couple of libraries for testing scientific Python wheels
   # packages: [libgl1, ffmpeg]
      #- libglib2.0-0
     # - libsm6
      #- libxext6
     # - libxrender1

  
  - action: run
    chroot: true
    description: Disable APT recommends/suggests
    command: |
      cat >/etc/apt/apt.conf.d/01norecommends <<'EOF'
      APT::Install-Recommends "false";
      APT::Install-Suggests "false";
      EOF
# Tell apt not to keep downloaded .debs and not to fetch translations
  - action: run
    chroot: true
    description: Slim apt caches by default
    command: |
      cat >/etc/apt/apt.conf.d/02slim <<'EOF'
      APT::Keep-Downloaded-Packages "false";
      Acquire::Languages "none";
      EOF

  - action: run
    description: Set hostname and hosts
    chroot: true
    command: |
      set -e
      echo "{{ $hostname }}" > /etc/hostname
      sed -i "s/^\(127\.0\.1\.1[[:space:]]*\).*/\1{{ $hostname }}/" /etc/hosts || \
      printf '\n127.0.1.1\t{{ $hostname }}\n' >> /etc/hosts

  - action: apt
    description: Small runtime libs often used by scientific wheels
    packages: [libgomp1, libstdc++6, libgcc-s1]

  {{- if and $device_mount $mount_point }}
  - action: run
    chroot: true
    description: Mount 9p share via fstab
    command: |
      set -e
      install -d -m 0755 "{{ $mount_point }}"

      awk -v dev="{{ $device_mount }}" -v mp="{{ $mount_point }}" '
      !($1==dev && $2==mp && $3=="9p") { print }
      ' /etc/fstab > /etc/fstab.new || true
      mv /etc/fstab.new /etc/fstab

      line="{{ $device_mount }} {{ $mount_point }} 9p trans=virtio,version=9p2000.L,msize=262144 0 0"
      grep -qF -- "$line" /etc/fstab || printf '%s\n' "$line" >> /etc/fstab
  {{- end }}


  - action: run
    description: Enable serial autologin
    chroot: true
    script: ./setup-user.sh

  {{- if $overlay_dir }}
  - action: overlay
    description: Overlay files into the target rootfs
    source: {{ $overlay_dir }}
    destination: {{ $overlay_dest }}
  {{- end }}

  {{- if $custom_script }}
  - action: overlay
    description: Add custom script into rootfs
    source: {{ $custom_script }}
    destination: {{ $custom_script_dest }}

  - action: run
    chroot: true
    description: Run custom script inside rootfs
    command: |
      set -eu
      chmod 0755 "{{ $custom_script_dest }}"
      /bin/sh "{{ $custom_script_dest }}"
  {{- end }}   

  {{- if eq $py_enable "1" }}
  - action: apt
    description: Install Python runtime + temporary pip
    packages: [python3, python3-pip]

  - action: run
    description: Stage requirements file into ROOTDIR
    command: |
      set -e
      echo "ROOTDIR=${ROOTDIR}"
      test -d "${ROOTDIR}" || { echo "ROOTDIR missing!"; exit 1; }
      install -d "${ROOTDIR}/root"
      if [ -f "{{ $reqs_file }}" ]; then
        install -m 0644 "{{ $reqs_file }}" "${ROOTDIR}/root/py-reqs.txt"
        echo "Using requirements from {{ $reqs_file }}"
      else
        echo "No {{ $reqs_file }}; creating empty list."
        : > "${ROOTDIR}/root/py-reqs.txt"
      fi
      ls -l "${ROOTDIR}/root/py-reqs.txt"

  - action: run
    description: Install Python packages system-wide
    chroot: true
    environment: { PIP_BREAK_SYSTEM_PACKAGES: "1", PIP_NO_CACHE_DIR: "1" }
    command: |
      set -e
      test -f /root/py-reqs.txt || { echo "Missing /root/py-reqs.txt"; ls -l /root; exit 1; }
      mkdir -p /root/pip-tmp
      export TMPDIR=/root/pip-tmp
      python3 -m pip install --break-system-packages --no-cache-dir --upgrade pip
      python3 -m pip install --break-system-packages --no-cache-dir -r /root/py-reqs.txt
      rm -rf /root/.cache/pip /root/pip-tmp /tmp/pip-* /tmp/tmp*

  {{- if eq $py_compile_pyc "1" }}
  - action: run
    description: Precompile .pyc bytecode
    chroot: true
    command: |
      python3 -m compileall -q -j 0 /usr/local/lib/python* /usr/lib/python* || true
  {{- end }}

  {{- if eq $py_prune_tests "1" }}
  - action: run
    description: Prune tests and __pycache__
    chroot: true
    command: |
      find /usr/local/lib/python* -type d -name 'tests' -prune -exec rm -rf {} + 2>/dev/null || true
      find /usr/local/lib/python* -type d -name '__pycache__' -prune -exec rm -rf {} + 2>/dev/null || true
  {{- end }}

  {{- if eq $py_drop_sources "1" }}
  - action: run
    description: Drop .py sources (keeps .pyc)
    chroot: true
    command: |
      find /usr/local/lib/python* -type f -name '*.py' -delete 2>/dev/null || true

  - action: run
    description: Remove pip and clean caches
    chroot: true
    command: |
      set -e
      apt-get purge -y python3-pip || true
      apt-get autoremove -y --purge || true
      rm -rf /root/.cache/pip /var/cache/apt/archives/* /var/lib/apt/lists/*
  {{- end }}
  {{- end }}

  - action: run
    chroot: true
    description: Disable binfmt units (not needed on target)
    command: |
      set -e
      systemctl --no-reload --no-ask-password mask \
      systemd-binfmt.service \
      proc-sys-fs-binfmt_misc.mount \
      proc-sys-fs-binfmt_misc.automount || true

  - action: run
    chroot: true
    description: Make journald volatile and clean apt caches
    command: |
      sed -i 's/^#\?Storage=.*/Storage=volatile/' /etc/systemd/journald.conf || true
      rm -rf /var/log/journal/* /var/log/* 2>/dev/null || true
      rm -rf /var/lib/apt/lists/* /var/cache/apt/archives/*.deb
  
  {{- $keep_locales := or .keep_locales "en" -}}
  - action: run
    chroot: true
    description: Prune docs/man/extra locales that are already installed
    command: |
      set -e
      # docs & man
      find /usr/share/doc -mindepth 1 -type d -exec rm -rf {} + || true
      find /usr/share/doc -type f ! -name copyright -delete || true
      rm -rf /usr/share/man/* /usr/share/info/*

      # i18n catalogs under /usr/share/locale (keep selected prefix)
      find /usr/share/locale -mindepth 1 -maxdepth 1 \
      ! -name '{{ $keep_locales }}*' -exec rm -rf {} + || true
  

  - action: run
    chroot: true
    description: Final prune of apt caches and logs
    command: |
      rm -rf /var/lib/apt/lists/* \
             /var/cache/apt/archives/*.deb \
             /var/cache/apt/*.bin \
             /var/log/* /var/log/journal/* || true  

  {{- if or (eq $format "cpio") (eq $format "cpio.gz") }}
  - action: run
    chroot: true
    description: Ensure /init exists for initramfs boot
    command: |
      [ -e /init ] || ln -s /sbin/init /init
  {{- end }}

  {{- if eq $format "ext4" }}
  - action: image-partition
    description: Create an ext4 disk image
    imagename: {{ $imgname }}            # filename only; Debos stores it in --artifactdir
    imagesize: {{ $imgsize }}
    partitiontype: gpt
    mountpoints: [{ mountpoint: "/", partition: root }]
    partitions:
      - { name: root, fs: ext4, start: 0%, end: 100% }

  - action: filesystem-deploy
    description: Copy rootfs into the image

  # (optional) just to show where it landed
  - action: run
    description: Show image in artifact dir
    command: |
      ls -lh "${ARTIFACTDIR}/{{ $imgname }}"

  {{- else if eq $format "cpio" }}
  - action: run
    description: Build uncompressed CPIO archive
    command: |
      set -e
      cd "${ROOTDIR}"
      install -d "${ARTIFACTDIR}"
      find . -print0 | cpio --null -o --format=newc > "${ARTIFACTDIR}/{{ $cpioname }}"

  {{- else if eq $format "cpio.gz" }}
  - action: run
    description: Build gzip-compressed CPIO archive
    command: |
      set -e
      cd "${ROOTDIR}"
      install -d "${ARTIFACTDIR}"
      find . -print0 | cpio --null -o --format=newc | gzip -9 > "${ARTIFACTDIR}/{{ $cpioname_gz }}"

  {{- else }}
  - action: pack
    description: Create rootfs tarball
    file: {{ $tarname }} 
    compression: gz
  {{- end }}
